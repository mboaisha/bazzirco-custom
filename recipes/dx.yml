modules:
  - type: dnf
    repos:
      cleanup: true
      files:
        - vscodium.repo
      keys:
        - https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg
    install:
      packages:
        - codium # VSCodium, alternative to VSCode
        - neovim
        - podman-tui
        - podman-machine
        - waypipe
        - cockpit
        - ansible
        - ccache
        - restic
        - rclone
        - flatpak-builder
        - usbmuxd
        - git-subtree
        - tshark
        - wireshark
        - nmap
        - mtr # Better traceroute
        - sshd
    group-install: # Install virtualization tooling
      with-optional: true
      packages:
        - virtualization
  - type: default-flatpaks
    configurations:
      - scope: system
        notify: false
        repo:
          url: https://flathub.org/repo/flathub.flatpakrepo
          title: Flathub (system)
        install:
          - io.podman_desktop.PodmanDesktop # Podman desktop
          - me.iepure.devtoolbox
          #- com.github.marhkb.Pods
  - type: systemd
    system:
      enabled: cockpit.socket